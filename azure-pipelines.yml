trigger:
  - none

pool: Aexion pool

stages:
  - stage: TerraformToolInstallation
    displayName: TerraformInstall

    jobs: 
       - job: TerraformToolInstall
         steps:
           - task: TerraformInstaller@1
             inputs:
               terraformVersion: 'latest'
       
  - stage: TerraformInit
    displayName: Init
  


    jobs:
      - job: TerraformInitUse
        steps:
            - task: TerraformTask@5
              inputs:
                provider: 'azurerm'
                command: 'init'
                workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
                backendServiceArm: 'Aexion service connection'
                backendAzureRmResourceGroupName: 'axion-secret'
                backendAzureRmStorageAccountName: 'axionstgbackend'
                backendAzureRmContainerName: 'axioncontainer'
                backendAzureRmKey: 'prod.tfstate'


  - stage: TerraformPlan
    displayName: Plan


    jobs:
      - job: TerraformplanUse
        steps: 
            - task: TerraformTask@5
              inputs:
                provider: 'azurerm'
                command: 'init'
                workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
                backendServiceArm: 'Aexion service connection'
                backendAzureRmResourceGroupName: 'axion-secret'
                backendAzureRmStorageAccountName: 'axionstgbackend'
                backendAzureRmContainerName: 'axioncontainer'
                backendAzureRmKey: 'prod.tfstate'

            - task: TerraformTask@5
              inputs:
                provider: 'azurerm'
                command: 'plan'
                workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
                commandOptions: '-var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\dev\terraform.tfvars"'
                environmentServiceNameAzureRM: 'Aexion service connection'