pr:
  branches:
    include:
      - feature/sprint-1-feature

parameters:
  - name: environment
    displayName: Choose Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: apply
    values:
      - plan
      - apply

pool: Aexion New Agent

stages:
  - stage: Terraform_install
    jobs:
      - job: Terraform
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - task: PowerShell@2
            inputs:
              targetType: 'inline'
              script: |
                terraform version
                terraform fmt -check -recursive

  - stage: Terraform_init
    displayName: init & validate
    jobs:
      - job: Terraform_Initialization
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
              backendServiceArm: 'Aexion service connection'
              backendAzureRmStorageAccountName: 'axionstgbackend'
              backendAzureRmContainerName: 'axioncontainer'
              backendAzureRmKey: 'axion.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'

  - stage: Terraform_Security_Scan
    displayName: TFSEC Security Scan
    dependsOn: Terraform_init

    jobs:
      - job: TFSEC
        displayName: Run TFSEC Scan

        steps:
          - powershell: |
              & "C:\Tools\tfsec\tfsec.exe" --version
            displayName: Verify tfsec

          - powershell: |
              & "C:\Tools\tfsec\tfsec.exe" `
                "$(System.DefaultWorkingDirectory)\Terraform" `
                --minimum-severity HIGH `
                --format sarif `
                --out "$(Build.ArtifactStagingDirectory)\tfsec-report"
            displayName: Generate tfsec Report

          - task: PublishBuildArtifacts@1
            displayName: Publish tfsec Report
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)\tfsec-report'
              artifactName: 'TFSEC-Report'

  - stage: Terraform_plan
    displayName: plan
    dependsOn: Terraform_Security_Scan

    jobs:
      - job: Terraform_plan
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
              backendServiceArm: 'Aexion service connection'
              backendAzureRmStorageAccountName: 'axionstgbackend'
              backendAzureRmContainerName: 'axioncontainer'
              backendAzureRmKey: 'axion.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
              commandOptions: '-var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\dev\terraform.tfvars"'
              environmentServiceNameAzureRM: 'Aexion service connection'