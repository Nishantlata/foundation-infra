pr:
  branches:
    include:
      - feature/sprint-1-feature

parameters:
  - name: environment
    displayName: Choose Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: apply
    values:
      - plan
      - apply

pool:
  name: 'Aexion New Agent'

# ==========================================================
# STAGE 1 - TERRAFORM INSTALL
# ==========================================================
stages:
- stage: Terraform_install
  displayName: Terraform Install

  jobs:
    - job: Terraform_Install
      displayName: Install Terraform

      steps:
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: 'latest'

        - task: PowerShell@2
          displayName: Terraform Version & Format Check
          inputs:
            targetType: inline
            script: |
              terraform version
              terraform fmt -check -recursive

# ==========================================================
# STAGE 2 - INIT & VALIDATE
# ==========================================================
- stage: Terraform_init
  displayName: Terraform Init & Validate
  dependsOn: Terraform_install

  jobs:
    - job: Terraform_Initialization
      displayName: Terraform Initialization

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'

# ==========================================================
# STAGE 3 - TFSEC SECURITY SCAN
# ==========================================================
- stage: Terraform_Security_Scan
  displayName: "TFSEC Security Scan"
  dependsOn: Terraform_init

  jobs:
    - job: TFSEC
      displayName: "Run TFSEC Scan"

      steps:

      # ------------------------------------------
      # Verify TFSEC Installation
      # ------------------------------------------
      - powershell: |
          & "C:\Tools\tfsec\tfsec.exe" --version
        displayName: "Verify TFSEC"

      # ------------------------------------------
      # Create Report Folder
      # ------------------------------------------
      - powershell: |
          New-Item `
            -Path "$(Build.ArtifactStagingDirectory)\TFSEC-Report" `
            -ItemType Directory `
            -Force
        displayName: "Create Report Folder"

      # ------------------------------------------
      # Generate Reports
      # ------------------------------------------
      - powershell: |
          $reportFolder = "$(Build.ArtifactStagingDirectory)\TFSEC-Report"

          # SARIF Report
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format sarif `
            --out "$reportFolder\tfsec-report.sarif"

          # JSON Report
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format json `
            --out "$reportFolder\tfsec-report.json"

          # HTML Report
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format lovely `
            --out "$reportFolder\tfsec-report.html"

          Write-Host "===== REPORTS GENERATED ====="
          Get-ChildItem $reportFolder
        displayName: "Generate TFSEC Reports"
        continueOnError: true

      # ------------------------------------------
      # Show Vulnerabilities in Azure DevOps UI
      # ------------------------------------------
      - powershell: |
          $report = "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.json"

          if (Test-Path $report) {

            $results = (Get-Content $report -Raw | ConvertFrom-Json).results

            foreach ($item in $results) {

              $severity = $item.severity
              $rule = $item.rule_id
              $message = $item.description

              switch ($severity) {

                "HIGH" {
                  Write-Host "##vso[task.logissue type=error]TFSEC [$rule] - $message"
                }

                "CRITICAL" {
                  Write-Host "##vso[task.logissue type=error]TFSEC [$rule] - $message"
                }

                default {
                  Write-Host "##vso[task.logissue type=warning]TFSEC [$rule] - $message"
                }
              }
            }
          }
        displayName: "Publish Findings To Azure UI"
        continueOnError: true

      # ------------------------------------------
      # Publish Reports
      # ------------------------------------------
      - task: PublishPipelineArtifact@1
        displayName: "Publish TFSEC Reports"
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)\TFSEC-Report'
          artifact: 'TFSEC-Report'



# ==========================================================
# STAGE 4 - TERRAFORM PLAN
# ==========================================================
- stage: Terraform_plan
  displayName: Terraform Plan
  dependsOn: Terraform_Security_Scan

  jobs:
    - job: Terraform_Plan
      displayName: Run Terraform Plan

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Plan
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-out=tfplan -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'

# ==========================================================
# STAGE 5 - TERRAFORM APPLY
# ==========================================================
- stage: Terraform_apply
  displayName: Terraform Apply
  dependsOn: Terraform_plan
  condition: and(succeeded(), eq('${{ parameters.terraformAction }}', 'apply'))

  jobs:
    - job: Terraform_Apply
      displayName: Run Terraform Apply

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Apply
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-auto-approve -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'