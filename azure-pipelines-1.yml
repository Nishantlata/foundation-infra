trigger:
  branches:
      include:
        - main

pr:
  branches:
      include:
        - feature/sprint-1-feature

parameters:
  - name: environment
    displayName: Choose Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

  - name: terraformAction
    displayName: Teraform Action
    type: string
    default: apply
    values:
      - plan
      - apply

pool: Aexion pool

stages:
  - stage: Terraform_install
    jobs:
      - job: Terraform
        steps:
        - task: TerraformInstaller@1
          inputs:
           terraformVersion: 'latest'

  - stage: Azure_Login
    displayName: "Azure Login"
    jobs:
      - job: Cloud_Login
        steps:
        - task: AzureCLI@3
          inputs:
            connectionType: 'azureRM'
            azureSubscription: 'Aexion service connection'
            scriptType: 'ps'
            scriptLocation: 'inlineScript'
            inlineScript: |
              Write-Host "Setting Subscription..."
              az account set --subscription "$(subscriptionId)"
              
              Write-Host "Current Subscription:"
              az account show --output table