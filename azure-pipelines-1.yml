pr:
  branches:
    include:
      - feature/sprint-1-feature

parameters:
  - name: environment
    displayName: Choose Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: apply
    values:
      - plan
      - apply

pool:
  name: 'Aexion New Agent'

stages:

# ===========================
# Terraform Install
# ===========================
- stage: Terraform_install
  displayName: Terraform Install

  jobs:
    - job: Terraform_Install
      displayName: Install Terraform

      steps:
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: 'latest'

        - task: PowerShell@2
          displayName: Terraform Version & Format Check
          inputs:
            targetType: inline
            script: |
              terraform version
              terraform fmt -check -recursive

# ===========================
# Init & Validate
# ===========================
- stage: Terraform_init
  displayName: Terraform Init & Validate
  dependsOn: Terraform_install

  jobs:
    - job: Terraform_Initialization
      displayName: Terraform Initialization

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'

# ===========================
# TFSEC Security Scan
# ===========================
- stage: Terraform_Security_Scan
  displayName: TFSEC Security Scan
  dependsOn: Terraform_init

  jobs:
    - job: TFSEC
      displayName: Run TFSEC Scan

      steps:

        - powershell: |
            & "C:\Tools\tfsec\tfsec.exe" --version
          displayName: Verify tfsec

        # Generate SARIF Report
        - powershell: |
            $reportPath = "$(Build.ArtifactStagingDirectory)\tfsec-report.sarif"

            & "C:\Tools\tfsec\tfsec.exe" `
              "$(System.DefaultWorkingDirectory)\Terraform" `
              --minimum-severity HIGH `
              --format sarif `
              --out $reportPath

            Write-Host "SARIF Report Generated:"
            Get-ChildItem "$(Build.ArtifactStagingDirectory)"
          displayName: Generate tfsec SARIF Report

        # Show findings in Azure DevOps UI
        - powershell: |
            $report = "$(Build.ArtifactStagingDirectory)\tfsec-report.sarif"

            if (!(Test-Path $report)) {
              Write-Host "No tfsec report found."
              exit 0
            }

            $sarif = Get-Content $report -Raw | ConvertFrom-Json

            $count = 0

            foreach ($result in $sarif.runs.results) {

              $message = $result.message.text

              $ruleId = $result.ruleId

              Write-Host "##vso[task.logissue type=warning]TFSEC [$ruleId] - $message"

              $count++
            }

            Write-Host "Total Findings: $count"
          displayName: Publish TFSEC Findings to UI

        # Publish Artifact
        - task: PublishBuildArtifacts@1
          displayName: Publish tfsec Report
          inputs:
            pathToPublish: '$(Build.ArtifactStagingDirectory)'
            artifactName: 'TFSEC-Report'

        # Optional - Fail pipeline if findings exist
        # Uncomment if required
        #
        # - powershell: |
        #     $report = "$(Build.ArtifactStagingDirectory)\tfsec-report.sarif"
        #
        #     if (!(Test-Path $report)) {
        #       exit 0
        #     }
        #
        #     $sarif = Get-Content $report -Raw | ConvertFrom-Json
        #
        #     if ($sarif.runs.results.Count -gt 0) {
        #         Write-Error "High severity TFSEC findings detected."
        #         exit 1
        #     }
        #   displayName: Fail on TFSEC Findings

# ===========================
# Terraform Plan
# ===========================
- stage: Terraform_plan
  displayName: Terraform Plan
  dependsOn: Terraform_Security_Scan

  jobs:
    - job: Terraform_Plan
      displayName: Run Terraform Plan

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Plan
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-out=tfplan -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'

# ===========================
# Terraform Apply
# ===========================
- stage: Terraform_apply
  displayName: Terraform Apply
  dependsOn: Terraform_plan
  condition: and(succeeded(), eq('${{ parameters.terraformAction }}','apply'))

  jobs:
    - job: Terraform_Apply
      displayName: Run Terraform Apply

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Apply
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-auto-approve -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'