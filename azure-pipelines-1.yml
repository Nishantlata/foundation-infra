pr:
  branches:
    include:
      - feature/sprint-1-feature

parameters:
  - name: environment
    displayName: Choose Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod

  - name: terraformAction
    displayName: Terraform Action
    type: string
    default: apply
    values:
      - plan
      - apply

pool:
  name: 'Aexion New Agent'

# ==========================================================
# STAGE 1 - TERRAFORM INSTALL
# ==========================================================
stages:
- stage: Terraform_install
  displayName: Terraform Install

  jobs:
    - job: Terraform_Install
      displayName: Install Terraform

      steps:
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: 'latest'

        - task: PowerShell@2
          displayName: Terraform Version & Format Check
          inputs:
            targetType: inline
            script: |
              terraform version
              terraform fmt -check -recursive

# ==========================================================
# STAGE 2 - INIT & VALIDATE
# ==========================================================
- stage: Terraform_init
  displayName: Terraform Init & Validate
  dependsOn: Terraform_install

  jobs:
    - job: Terraform_Initialization
      displayName: Terraform Initialization

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'

# ==========================================================
# STAGE 3 - TFSEC SECURITY SCAN
# ==========================================================
- stage: Terraform_Security_Scan
  displayName: "TFSEC Security Scan"
  dependsOn: Terraform_init
  condition: succeeded()

  jobs:
    - job: TFSEC
      displayName: "Run TFSEC Scan"

      steps:

      # ------------------------------------------
      # Verify TFSEC
      # ------------------------------------------
      - powershell: |
          & "C:\Tools\tfsec\tfsec.exe" --version
        displayName: "Verify TFSEC"

      # ------------------------------------------
      # Create Report Folder
      # ------------------------------------------
      - powershell: |
          New-Item `
            -Path "$(Build.ArtifactStagingDirectory)\TFSEC-Report" `
            -ItemType Directory `
            -Force | Out-Null
        displayName: "Create Report Folder"

      # ------------------------------------------
      # Generate SARIF Report
      # ------------------------------------------
      - powershell: |
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format sarif `
            --out "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.sarif"
        displayName: "Generate SARIF Report"
        continueOnError: true

      # ------------------------------------------
      # Generate JSON Report
      # ------------------------------------------
      - powershell: |
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format json `
            --out "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.json"
        displayName: "Generate JSON Report"
        continueOnError: true

      # ------------------------------------------
      # Generate HTML Report
      # ------------------------------------------
      - powershell: |
          & "C:\Tools\tfsec\tfsec.exe" `
            "$(System.DefaultWorkingDirectory)\Terraform" `
            --minimum-severity LOW `
            --format lovely `
            --out "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.html"
        displayName: "Generate HTML Report"
        continueOnError: true

      # ------------------------------------------
      # Publish Findings to Warnings/Errors
      # ------------------------------------------
      - powershell: |
          $report = "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.json"

          if (!(Test-Path $report)) {
            Write-Host "No TFSEC report found."
            exit 0
          }

          $results = (Get-Content $report -Raw | ConvertFrom-Json).results

          foreach ($item in $results) {

            $severity = $item.severity
            $rule = $item.rule_id
            $description = $item.description

            $message = "TFSEC [$rule] - $description"

            switch ($severity.ToUpper()) {

              "HIGH" {
                Write-Host "##vso[task.logissue type=error]$message"
              }

              "CRITICAL" {
                Write-Host "##vso[task.logissue type=error]$message"
              }

              default {
                Write-Host "##vso[task.logissue type=warning]$message"
              }
            }
          }

          exit 0
        displayName: "Publish Findings To UI"
        continueOnError: true

      # ------------------------------------------
      # Convert JSON to JUnit XML
      # (For Test Tab like screenshot)
      # ------------------------------------------
      - powershell: |
          $jsonFile = "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-report.json"
          $xmlFile  = "$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-junit.xml"

          if (!(Test-Path $jsonFile)) {
            exit 0
          }

          $results = (Get-Content $jsonFile -Raw | ConvertFrom-Json).results

          $xml = New-Object System.Xml.XmlDocument

          $testsuite = $xml.CreateElement("testsuite")
          $testsuite.SetAttribute("name","tfsec")
          $testsuite.SetAttribute("tests",$results.Count)
          $testsuite.SetAttribute("failures",$results.Count)

          foreach ($item in $results) {

            $testcase = $xml.CreateElement("testcase")
            $testcase.SetAttribute("classname","tfsec")
            $testcase.SetAttribute("name",$item.rule_id)

            $failure = $xml.CreateElement("failure")
            $failure.SetAttribute("message",$item.description)

            $failure.InnerText =
            "Severity: $($item.severity)`n" +
            "File: $($item.location.filename)`n" +
            "Description: $($item.description)"

            $testcase.AppendChild($failure) | Out-Null
            $testsuite.AppendChild($testcase) | Out-Null
          }

          $xml.AppendChild($testsuite) | Out-Null
          $xml.Save($xmlFile)
        displayName: "Create JUnit Report"
        continueOnError: true

      # ------------------------------------------
      # Publish to Test Tab
      # ------------------------------------------
      - task: PublishTestResults@2
        displayName: "Publish TFSEC Test Results"
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(Build.ArtifactStagingDirectory)\TFSEC-Report\tfsec-junit.xml'
          testRunTitle: 'tfsec'
          failTaskOnFailedTests: false
        condition: always()

      # ------------------------------------------
      # Publish Artifacts
      # ------------------------------------------
      - task: PublishPipelineArtifact@1
        displayName: "Publish TFSEC Reports"
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)\TFSEC-Report'
          artifact: 'TFSEC-Report'
          publishLocation: 'pipeline'

# ==========================================================
# STAGE 4 - TERRAFORM PLAN
# ==========================================================
- stage: Terraform_plan
  displayName: Terraform Plan
  dependsOn: Terraform_Security_Scan

  jobs:
    - job: Terraform_Plan
      displayName: Run Terraform Plan

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Plan
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-out=tfplan -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'

# ==========================================================
# STAGE 5 - TERRAFORM APPLY
# ==========================================================
- stage: Terraform_apply
  displayName: Terraform Apply
  dependsOn: Terraform_plan
  condition: and(succeeded(), eq('${{ parameters.terraformAction }}', 'apply'))

  jobs:
    - job: Terraform_Apply
      displayName: Run Terraform Apply

      steps:
        - task: TerraformTask@5
          displayName: Terraform Init for Apply
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            backendServiceArm: 'Aexion service connection'
            backendAzureRmStorageAccountName: 'axionstgbackend'
            backendAzureRmContainerName: 'axioncontainer'
            backendAzureRmKey: 'axion.tfstate'

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)\Terraform'
            commandOptions: '-auto-approve -var-file="$(System.DefaultWorkingDirectory)\Terraform\environment\${{ parameters.environment }}\terraform.tfvars"'
            environmentServiceNameAzureRM: 'Aexion service connection'